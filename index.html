<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiggl Deep Link Test</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f9;
        color: #333;
        text-align: center;
      }
      .container {
        padding: 2rem;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-top: 0;
        color: #ff4b2b;
      }
      p {
        font-size: 1.1rem;
        line-height: 1.5;
      }
      .button {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.8rem 1.5rem;
        background-color: #ff4b2b;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: background-color 0.2s;
      }
      .button:hover {
        background-color: #e04124;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Wiggl.co</h1>
      <p>This website is used for <strong>Deep Link Testing</strong>.</p>
      <p>If you were expecting a full website, please check back later!</p>
      <a
